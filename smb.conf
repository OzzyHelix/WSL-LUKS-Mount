[global]
	# WSL Compatibility & Stability Fixes
	kernel oplocks = no
	kernel share modes = no
	posix locking = no
	strict locking = no
	vfs objects = acl_xattr shadow_copy2
	ea support = no
	store dos attributes = no
	# Protocol & Security
	workgroup = WORKGROUP
	server role = standalone server
	server string = Ozzy Pro Samba Shares
	server max protocol = SMB3
	server min protocol = SMB2
	map to guest = bad user
	usershare allow guests = yes

	# Logging (Set to standard systemd for WSL debugging)
	logging = systemd
	log file = /var/log/samba/log.%m
	max log size = 1000
	log level = 1
	panic action = /usr/share/samba/panic-action %d

	# Modern Network Performance (Removed deprecated raw options)
	socket options = TCP_NODELAY
	use sendfile = true
	aio read size = 16384
	aio write size = 16384

	# Authentication & Passwords
	obey pam restrictions = yes
	unix password sync = yes
	passwd program = /usr/bin/passwd %u
	passwd chat = *Enter\snew\s*\spassword:* %n\n *Retype\snew\s*\spassword:* %n\n *password\supdated\ssuccessfully* .
	pam password change = yes

	# Permissions mapping
	acl allow execute always = true
	map archive = yes
	map hidden = yes
	map readonly = yes
	map system = yes

	# inclusion of net registry, inserted by cockpit-file-sharing:
	include = registry


[home]
	comment = home directory
	path = /mnt/archhome
	guest ok = no
	read only = no
	browseable = yes
	create mask = 0777
	directory mask = 0777
	valid users = ozzy

[games]
	comment = m2vdisk partition
	path = /mnt/games
	guest ok = no
	read only = no
	browseable = yes
	create mask = 0777
	directory mask = 0777
	valid users = ozzy
